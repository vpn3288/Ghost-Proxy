name: Build AmneziaWG Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: linux-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            arch: amd64
          - platform: arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build amneziawg-go and awg-tools
        run: |
          set -euo pipefail
          mkdir -p dist
          docker run --rm \
            --platform "linux/${{ matrix.platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:12 bash -lc '
              set -euo pipefail
              . ./versions.conf
              apt-get update -qq
              base_packages=(ca-certificates git build-essential bash make tar)
              if ! DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
                "${base_packages[@]}" \
                "golang-go=${GOLANG_VERSION}" \
                "pkg-config=${PKG_CONFIG_VERSION}" \
                "libmnl-dev=${LIBMNL_DEV_VERSION}"; then
                echo "Pinned build dependencies unavailable; falling back to Debian 12 defaults" >&2
                DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
                  "${base_packages[@]}" golang-go pkg-config libmnl-dev
              fi

              tmp_dir="$(mktemp -d)"
              trap "rm -rf ${tmp_dir}" EXIT

              git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-go.git "${tmp_dir}/amneziawg-go"
              git -C "${tmp_dir}/amneziawg-go" fetch --depth 1 origin "${AWG_GO_REF}"
              git -C "${tmp_dir}/amneziawg-go" checkout -q FETCH_HEAD
              make -C "${tmp_dir}/amneziawg-go"
              install -m 0755 "${tmp_dir}/amneziawg-go/amneziawg-go" "dist/amneziawg-go-linux-${{ matrix.arch }}"

              git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-tools.git "${tmp_dir}/amneziawg-tools"
              git -C "${tmp_dir}/amneziawg-tools" fetch --depth 1 origin "${AWG_TOOLS_REF}"
              git -C "${tmp_dir}/amneziawg-tools" checkout -q FETCH_HEAD
              make -C "${tmp_dir}/amneziawg-tools/src" WITH_WGQUICK=yes
              make -C "${tmp_dir}/amneziawg-tools/src" WITH_WGQUICK=yes DESTDIR="${tmp_dir}/tools-root" PREFIX=/usr install
              tar -C "${tmp_dir}/tools-root/usr/bin" -czf "dist/amneziawg-tools-linux-${{ matrix.arch }}.tar.gz" awg awg-quick
            '

      - name: Calculate SHA256
        run: |
          set -euo pipefail
          cd dist
          sha256sum "amneziawg-go-linux-${{ matrix.arch }}" "amneziawg-tools-linux-${{ matrix.arch }}.tar.gz" > "checksums-${{ matrix.arch }}.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: awg-linux-${{ matrix.arch }}
          path: |
            dist/amneziawg-go-linux-${{ matrix.arch }}
            dist/amneziawg-tools-linux-${{ matrix.arch }}.tar.gz
            dist/checksums-${{ matrix.arch }}.txt

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/amneziawg-go-linux-${{ matrix.arch }}
            dist/amneziawg-tools-linux-${{ matrix.arch }}.tar.gz
            dist/checksums-${{ matrix.arch }}.txt
