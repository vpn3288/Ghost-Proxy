# Ghost-Proxy dependency pinning defaults.
#
# Usage:
#   1. Scripts load versions.conf from their own directory automatically.
#   2. To override a pin, export the variable before running the script.
#   3. With bash <(curl ...), embedded defaults are used; download this file
#      beside the scripts when you need custom pins.
#
# Pinning rules:
#   - Upstream source refs use full git commit hashes.
#   - Debian packages use exact Bookworm package versions when practical.
#   - Prebuilt binaries must include real Release URLs and SHA256 sums.
#
# Leave a variable empty to use the distribution/latest available version.

RECOMMENDED_OS="debian"
RECOMMENDED_OS_VERSION="12"
RECOMMENDED_OS_POINT="12.14"
MIN_KERNEL_MAJOR="4"
MIN_KERNEL_MINOR="9"

# Debian 12 Bookworm baseline. Override from environment when a mirror differs.
DKMS_VERSION="3.0.10-8+deb12u1"
GCC_VERSION="12"
# Debian golang-go is kept as metadata only; amneziawg-go currently needs Go 1.24.4.
GOLANG_VERSION="2:1.19~1"
GO_TOOLCHAIN_VERSION="1.24.4"
GO_TOOLCHAIN_SHA256_AMD64="77e5da33bb72aeaef1ba4418b6fe511bc4d041873cbf82e5aa6318740df98717"
GO_TOOLCHAIN_SHA256_ARM64="d5501ee5aca0f258d5fe9bfaed401958445014495dc115f202d43d5210b45241"
PKG_CONFIG_VERSION="1.8.1-1"
LIBMNL_DEV_VERSION="1.0.4-3"
SINGBOX_VERSION="1.11.0"
SINGBOX_SHA256_AMD64="eff0237951bfbd2381be36f114e419f10d3ed57dbf929f680e4cc9f57e319d64"
SINGBOX_SHA256_ARM64="8fc21f46ddf2d7022c34d5e3e2298a3b4064b6e1f85dce5cc23cb9c6015dafc4"

# Upstream source refs pinned on 2026-05-20 for reproducible builds.
AWG_DKMS_REF="ac946a9df100a17d342b5982d1947deef1b51952"
AWG_TOOLS_REF="5d6179a6d0842e98dfb349c28cf1bd8e4b9d1079"
